name: Release

# Pushing a version tag (v1.0.9, v1.1.0, ...) builds an installable plugin
# zip and publishes it as a GitHub Release. The tag must match the Version
# header in parish-events.php.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches plugin version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! grep -q "^ \* Version:           ${version}$" parish-events.php; then
            echo "Tag ${GITHUB_REF_NAME} does not match the Version header in parish-events.php" >&2
            grep '^ \* Version:' parish-events.php >&2
            exit 1
          fi
          if ! grep -q "define( 'PE_VERSION', '${version}' );" parish-events.php; then
            echo "Tag ${GITHUB_REF_NAME} does not match PE_VERSION in parish-events.php" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          awk -v ver="$version" '$1 == "##" && $2 == ver { found = 1; next } $1 == "##" { found = 0 } found' CHANGELOG.md > dist/notes.md
          if ! grep -q '[^[:space:]]' dist/notes.md; then
            echo "CHANGELOG.md has no '## ${version}' section — write the release notes before tagging" >&2
            exit 1
          fi
          cat dist/notes.md

      - name: Build plugin zip
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/parish-events
          rsync -a \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='dist' \
            --exclude='.wp-env.json' \
            ./ dist/parish-events/
          cd dist
          zip -r "parish-events-${version}.zip" parish-events
          unzip -l "parish-events-${version}.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} — Parish Events
          files: dist/parish-events-*.zip
          body_path: dist/notes.md
          # Beta tags (v1.1.0-beta.1 — anything with a hyphen) publish as
          # prereleases: GitHub keeps them out of /releases/latest, so only
          # sites on the beta update channel are offered them.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Appends the compare link / new-contributor footer after the
          # hand-written notes.
          generate_release_notes: true
